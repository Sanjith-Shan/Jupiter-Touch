<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jupiter Touch — Director Console</title>
  <!-- Inline SVG favicon silences the otherwise harmless /favicon.ico 404
       that confuses people debugging the dashboard in DevTools. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%237070ee'/%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0f;
      color: #e8e8ec;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── top bar ─────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      background: #16161a;
      border-bottom: 1px solid #2a2a35;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 14px; font-weight: 600; letter-spacing: .04em; color: #c5c5d4; }
    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #3d3d55;
      transition: background .3s;
    }
    #status-dot.connected  { background: #3ecf8e; box-shadow: 0 0 6px #3ecf8e88; }
    #status-dot.connecting { background: #f0a500; box-shadow: 0 0 6px #f0a50088; }
    #status-label { font-size: 12px; color: #8888aa; }

    /* ── main two-pane layout ───────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 0;
    }

    /* left pane — video mirror */
    #video-pane {
      flex: 1 1 60%;
      background: #0a0a0c;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-right: 1px solid #2a2a35;
    }
    #video-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #44445a;
    }
    #video-placeholder svg { opacity: .35; }
    #video-placeholder p { font-size: 13px; }
    #video-placeholder code {
      font-size: 11px;
      background: #1e1e28;
      padding: 4px 8px;
      border-radius: 4px;
      color: #8888aa;
    }

    /* right pane — controls */
    #control-pane {
      flex: 0 0 320px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px 16px;
      gap: 24px;
    }

    /* scrcpy config */
    #scrcpy-config { display: flex; flex-direction: column; gap: 8px; }
    #scrcpy-config label { font-size: 11px; color: #6666aa; text-transform: uppercase; letter-spacing: .06em; }
    .row { display: flex; gap: 8px; }
    input[type=text] {
      flex: 1;
      background: #1e1e28;
      border: 1px solid #33334a;
      border-radius: 6px;
      color: #e0e0f0;
      padding: 7px 10px;
      font-size: 13px;
    }
    input[type=text]:focus { outline: none; border-color: #5555cc; }
    .btn-sm {
      background: #2a2a40;
      border: 1px solid #44447a;
      color: #c8c8e8;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-sm:hover { background: #35355a; }

    /* section divider */
    .section-label {
      font-size: 11px;
      color: #6666aa;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding-bottom: 4px;
      border-bottom: 1px solid #22222e;
    }

    /* scene buttons */
    #scene-buttons { display: flex; flex-direction: column; gap: 10px; }
    .scene-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e1e2a;
      border: 1px solid #33334a;
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      color: #d8d8f0;
      font-size: 14px;
      font-weight: 500;
      transition: background .15s, border-color .15s;
    }
    .scene-btn:hover:not(.is-disabled) { background: #28283c; border-color: #5555aa; }
    .scene-btn.active { background: #1e1e40; border-color: #7070ee; }
    .scene-btn.is-disabled {
      opacity: .35;
      cursor: not-allowed;
    }
    .scene-btn .badge {
      font-size: 11px;
      background: #2e2e4a;
      padding: 2px 7px;
      border-radius: 12px;
      color: #8888cc;
      margin-left: auto;
    }
    .scene-btn.active .badge { background: #3a3a70; color: #aaaaf0; }

    /* event buttons */
    #event-buttons { display: flex; flex-direction: column; gap: 8px; }
    .event-btn {
      background: #1a1a26;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 9px 12px;
      cursor: pointer;
      color: #b8b8d0;
      font-size: 12px;
      font-weight: 500;
      text-align: left;
      transition: background .15s, border-color .15s;
    }
    .event-btn:hover:not(.is-disabled) { background: #25253a; border-color: #4a4a7a; color: #e0e0f0; }
    .event-btn.is-disabled {
      opacity: .35;
      cursor: not-allowed;
    }
    .event-btn.danger { color: #d88080; border-color: #4a2222; }
    .event-btn.danger:hover:not(.is-disabled) { background: #2a1818; border-color: #804040; color: #ffaaaa; }

    /* log */
    #log-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }
    #log {
      flex: 1;
      background: #111118;
      border: 1px solid #22222e;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: #7070a0;
      overflow-y: auto;
      min-height: 80px;
    }
    .log-entry { line-height: 1.6; }
    .log-entry.sent    { color: #7090f0; }
    .log-entry.recv    { color: #50b080; }
    .log-entry.system  { color: #a08040; }
    .log-entry.error   { color: #e05050; }
  </style>
</head>
<body>

<div id="topbar">
  <div id="status-dot" class="connecting"></div>
  <h1>Jupiter Touch — Director</h1>
  <span id="status-label">Connecting to server…</span>
</div>

<div id="main">

  <!-- left: video mirror -->
  <div id="video-pane">
    <div id="video-placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p>Quest mirror not connected</p>
      <p style="font-size:11px; color:#33334a">Start ws-scrcpy, then enter the URL below</p>
    </div>
    <!-- iframe injected by director.js once URL is set -->
  </div>

  <!-- right: controls -->
  <div id="control-pane">

    <!-- scrcpy URL config -->
    <div id="scrcpy-config">
      <label>ws-scrcpy URL</label>
      <div class="row">
        <input type="text" id="scrcpy-url" placeholder="http://localhost:8000" />
        <button class="btn-sm" id="btn-load-mirror">Connect</button>
      </div>
    </div>

    <!-- scene control -->
    <div>
      <div class="section-label">Scenes</div>
      <div id="scene-buttons" style="margin-top:10px">
        <!-- populated by SCENES array in director.js -->
      </div>
    </div>

    <!-- in-scene event triggers -->
    <div>
      <div class="section-label">Events</div>
      <div id="event-buttons" style="margin-top:10px">
        <!-- populated by EVENTS array in director.js -->
      </div>
    </div>

    <!-- log -->
    <div id="log-area">
      <div class="section-label">Log</div>
      <div id="log"></div>
    </div>

  </div>
</div>

<script src="/static/director.js"></script>
</body>
</html>
